<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPC 구강 포토 실습 매뉴얼</title>
  <style>
    /* 🚫 강력한 복사 및 드래그 방지 CSS */
    body {
      -webkit-user-select: none; /* 크롬, 사파리 텍스트 선택 방지 */
      -moz-user-select: none;    /* 파이어폭스 텍스트 선택 방지 */
      -ms-user-select: none;     /* IE 텍스트 선택 방지 */
      user-select: none;         /* 기본 텍스트 선택 방지 */
      -webkit-touch-callout: none; /* 모바일에서 화면 꾹 누를 때 뜨는 '이미지 저장' 팝업 방지 */
      background-color: #2c3e50;
      margin: 0; 
      padding: 0;
      text-align: center;
      font-family: 'Pretendard', sans-serif;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .header {
      background: #1a252f;
      color: white;
      padding: 20px;
    }
    .header h1 { margin: 0; font-size: 22px; }
    .header p { margin: 5px 0 0; font-size: 13px; color: #e74c3c; }
    
    /* 이미지 드래그 원천 차단 */
    .slide-img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none; /* ❗ 이 코드가 이미지를 터치하거나 우클릭하는 것을 100% 막아줍니다 */
      border-bottom: 2px solid #ddd;
    }
  </style>
</head>

<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

  <div class="container">
    <div class="header">
      <h1>📸 BPC 구강 포토 실습 매뉴얼</h1>
      <p>※ 본 매뉴얼의 무단 캡처, 복제 및 배포를 엄격히 금지합니다.</p>
    </div>

    <img src="slide1.jpg" class="slide-img" alt="슬라이드 1">
    <img src="slide2.jpg" class="slide-img" alt="슬라이드 2">
    <img src="slide3.jpg" class="slide-img" alt="슬라이드 3">
    <img src="slide4.jpg" class="slide-img" alt="슬라이드 4">
    <img src="slide5.jpg" class="slide-img" alt="슬라이드 5">
    <img src="slide6.jpg" class="slide-img" alt="슬라이드 6">
    <img src="slide7.jpg" class="slide-img" alt="슬라이드 7">
    <img src="slide8.jpg" class="slide-img" alt="슬라이드 8">
    <img src="slide9.jpg" class="slide-img" alt="슬라이드 9">
    <img src="slide10.jpg" class="slide-img" alt="슬라이드 10">
    <div class="header" style="padding: 15px; font-size: 12px; color: #95a5a6;">
      ⓒ 2026 BPC 임상교육 매뉴얼
    </div>
  </div>

  <script>
    document.addEventListener('keydown', function(event) {
      if (event.keyCode === 123) { // F12 (개발자 도구)
        event.preventDefault(); return false;
      }
      if (event.ctrlKey && event.shiftKey && event.keyCode === 73) { // Ctrl+Shift+I
        event.preventDefault(); return false;
      }
      if (event.ctrlKey && event.keyCode === 67) { // Ctrl+C (복사)
        event.preventDefault(); return false;
      }
      if (event.ctrlKey && event.keyCode === 80) { // Ctrl+P (인쇄)
        event.preventDefault(); return false;
      }
    });
  </script>

</body>
</html>
