<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPC 구강 포토 실습 매뉴얼</title>
  <style>
    body {
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .header {
      background: #2c3e50;
      color: #fff;
      padding: 30px 20px;
      text-align: center;
    }
    .header h1 { margin: 0; font-size: 26px; }
    .header p { margin: 10px 0 0; opacity: 0.8; font-size: 15px; }
    .section {
      padding: 25px 30px;
      border-bottom: 1px solid #eee;
    }
    h2 {
      color: #2c3e50;
      border-left: 4px solid #3498db;
      padding-left: 10px;
      font-size: 20px;
      margin-top: 0;
    }
    /* PDF 창을 꽉 차게 만드는 스타일 */
    .pdf-container {
      width: 100%;
      height: 700px; /* PC에서 보기 좋은 세로 길이 */
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-top: 15px;
    }
    /* 모바일 환경 세로 길이 조절 */
    @media (max-width: 600px) {
      .pdf-container { height: 500px; }
    }
    .footer {
      text-align: center;
      padding: 20px;
      background: #e9ecef;
      color: #6c757d;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>📸 BPC 구강 포토 실습 매뉴얼</h1>
      <p>정확한 진단과 기록을 위한 BPC 포토 실습 원본 교재</p>
    </div>

    <div class="section">
      <h2>📖 포토 실습 교재 전체 보기</h2>
      <iframe class="pdf-container" src="포토실습교재.pdf">
        <p>현재 브라우저에서 PDF를 바로 볼 수 없습니다. <a href="포토실습교재.pdf">여기에서 PDF를 다운로드</a> 하세요.</p>
      </iframe>
    </div>

    <div class="footer">
      ⓒ 2026 BPC 임상교육 매뉴얼
    </div>
  </div>

</body>
</html>
